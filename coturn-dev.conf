# Coturn TURN server configuration for Lensisku WebRTC Development

# STUN/TURN server listening port (different from production)
listening-port=3479
tls-listening-port=5350

# Authentication
use-auth-secret
static-auth-secret=lensisku-dev-turn-secret-key
realm=localhost

# Total quota and user quota limits (lower for development)
total-quota=50
user-quota=6

# Bandwidth limit (lower for development)
max-bps=32000

# Security
stale-nonce
no-multicast-peers
no-loopback-peers

# TLS certificates (development certificates)
cert=/etc/ssl/certs/localhost.crt
pkey=/etc/ssl/private/localhost.key
cipher-list="ALL"

# Diffie-Hellman parameters
dh-file=/etc/ssl/certs/dhparam.pem

# Logging
log-file=/var/log/turnserver.log
simple-log

# Network configuration
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Relay configuration
relay-threads=25
min-port=49252
max-port=65535

# Allow anonymous access for testing (development only)
anonymous

# Fingerprinting
fingerprint

# Mobility
mobility

# CLI password
cli-password=turn-dev-cli-password
