<!doctype html>
<html>
  <head>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('lensisku.buttonTheme')
          document.documentElement.setAttribute(
            'data-button-theme',
            t === 'aqua' ? 'aqua' : 'flat'
          )
        } catch (e) {
          document.documentElement.setAttribute('data-button-theme', 'flat')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Search the Lojban dictionary and corpus. Find word definitions, usage examples, and community discussions in Lojban (la .lojban.)."
    />
    <title>Lojban Dictionary</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
