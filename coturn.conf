# Coturn TURN server configuration for Lensisku WebRTC

# STUN/TURN server listening port
listening-port=3478
tls-listening-port=5349

# Authentication
use-auth-secret
static-auth-secret=lensisku-turn-secret-key
realm=lensisku.lojban.org

# Total quota and user quota limits
total-quota=100
user-quota=12

# Bandwidth limit
max-bps=64000

# Security
stale-nonce
no-multicast-peers
no-loopback-peers

# TLS certificates (replace with actual certificates in production)
cert=/etc/ssl/certs/localhost.crt
pkey=/etc/ssl/private/localhost.key
cipher-list="ALL"

# Diffie-Hellman parameters
dh-file=/etc/ssl/certs/dhparam.pem

# Logging
log-file=/var/log/turnserver.log
simple-log

# Network configuration
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Relay configuration
relay-threads=50
min-port=49152
max-port=65535

# Allow anonymous access for testing (remove in production)
# anonymous

# Fingerprinting
fingerprint

# Mobility
mobility

# CLI password
cli-password=turn-cli-password
